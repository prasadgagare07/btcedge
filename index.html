<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BTC Edge AI</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🚀 BTC EDGE AI</h1>

<div class="card">
<h2>BTC Price</h2>
<div id="price">Loading...</div>
</div>

<div class="card">
<h2>30 Seconds</h2>
<p>🟢 Buy</p><div id="buy30">$0</div>
<p>🔴 Sell</p><div id="sell30">$0</div>
<p>⚖️ Delta</p><div id="delta30">$0</div>
</div>

<div class="card">
<h2>1 Minute</h2>
<p>🟢 Buy</p><div id="buy1">$0</div>
<p>🔴 Sell</p><div id="sell1">$0</div>
<p>⚖️ Delta</p><div id="delta1">$0</div>
</div>

<div class="card">
<h2>3 Minutes</h2>
<p>🟢 Buy</p><div id="buy3">$0</div>
<p>🔴 Sell</p><div id="sell3">$0</div>
<p>⚖️ Delta</p><div id="delta3">$0</div>
</div>

<div class="card">
<h2>5 Minutes</h2>
<p>🟢 Buy</p><div id="buy5">$0</div>
<p>🔴 Sell</p><div id="sell5">$0</div>
<p>⚖️ Delta</p><div id="delta5">$0</div>
</div>

<div class="card">
<h2>10 Minutes</h2>
<p>🟢 Buy</p><div id="buy10">$0</div>
<p>🔴 Sell</p><div id="sell10">$0</div>
<p>⚖️ Delta</p><div id="delta10">$0</div>
</div>

<script src="app.js"></script>

</body>
</html>
